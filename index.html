<!doctype html>

    <head>

                <tspan class="char-anim" style="--i: 1">l</tspan>

                <div class="book-page book-page-right">
                    <div class="page-content" id="page-right-content"></div>
                </div>

        <div id="about-info" class="about-info">
            <img class="about-avatar" src="assets/picture.jpg" alt="photo" />
            <p>周银邱</p>
            <p class="about-gap about-dim">2019–2023</p>
            <p>南京大学 大气科学 学士</p>

            <p class="about-gap">Email: 2816783712@qq.com</p>
            <p>WX: z1332787500</p>
