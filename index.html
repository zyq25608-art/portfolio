<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Portfolio Interaction</title>
        <link rel="stylesheet" href="style.css" />
        <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    </head>
    <body>
        <svg
            class="canvas"
            viewBox="0 0 1000 800"
            preserveAspectRatio="xMidYMid meet"
        >
            <!-- 核心单词 -->
            <text class="portfolio" x="500" y="300" text-anchor="middle">
                <tspan class="char-trigger" data-target="illustration">p</tspan>
                <tspan>o</tspan>
                <tspan>r</tspan>
                <tspan>t</tspan>
                <tspan>f</tspan>
                <tspan>o</tspan>
                <tspan>l</tspan>
                <tspan>i</tspan>
                <tspan>o</tspan>
            </text>

            <!-- 目标区块 -->
            <text
                class="section-title"
                data-section="digital"
                text-anchor="middle"
            >
                <!-- D 作为对齐锚点，竖线对齐 p 的竖线 -->
                <tspan class="char-target">D</tspan>
                <tspan class="char-anim" style="--i: 0">i</tspan>
                <tspan class="char-anim" style="--i: 1">g</tspan>
                <tspan class="char-anim" style="--i: 2">i</tspan>
                <tspan class="char-anim" style="--i: 3">t</tspan>
                <tspan class="char-anim" style="--i: 4">a</tspan>
                <tspan class="char-anim" style="--i: 5">l</tspan>
                <tspan class="char-anim space" style="--i: 6">&nbsp;</tspan>
                <tspan class="char-anim" style="--i: 7">P</tspan>
                <tspan class="char-anim" style="--i: 8">r</tspan>
                <tspan class="char-anim" style="--i: 9">o</tspan>
                <tspan class="char-anim" style="--i: 10">d</tspan>
                <tspan class="char-anim" style="--i: 11">u</tspan>
                <tspan class="char-anim" style="--i: 12">c</tspan>
                <tspan class="char-anim" style="--i: 13">t</tspan>
                <tspan class="char-anim" style="--i: 14">s</tspan>
            </text>

        </svg>

        <div class="hint">CLICK LETTER P</div>

        <script src="script.js"></script>
    </body>
</html>
