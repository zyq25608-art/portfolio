<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Portfolio Interaction</title>
        <link rel="stylesheet" href="style.css" />
        <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    </head>
    <body>
        <svg
            class="canvas"
            viewBox="0 0 1000 800"
            preserveAspectRatio="xMidYMid meet"
        >
            <!-- 核心单词 -->
            <text class="portfolio" x="500" y="300" text-anchor="middle">
                <tspan class="char-trigger char-trigger-p">p</tspan>
                <tspan>o</tspan>
                <tspan class="char-trigger char-trigger-r">r</tspan>
                <tspan>t</tspan>
                <tspan class="char-trigger char-trigger-f">f</tspan>
                <tspan>o</tspan>
                <tspan>l</tspan>
                <tspan>i</tspan>
                <tspan>o</tspan>
            </text>

            <!-- p → Digital Products -->
            <text class="section-title section-p" text-anchor="middle">
                <tspan class="char-target">D</tspan>
                <tspan class="char-anim" style="--i: 0">i</tspan>
                <tspan class="char-anim" style="--i: 1">g</tspan>
                <tspan class="char-anim" style="--i: 2">i</tspan>
                <tspan class="char-anim" style="--i: 3">t</tspan>
                <tspan class="char-anim" style="--i: 4">a</tspan>
                <tspan class="char-anim" style="--i: 5">l</tspan>
                <tspan class="char-anim space" style="--i: 6">&nbsp;</tspan>
                <tspan class="char-anim" style="--i: 7">P</tspan>
                <tspan class="char-anim" style="--i: 8">r</tspan>
                <tspan class="char-anim" style="--i: 9">o</tspan>
                <tspan class="char-anim" style="--i: 10">d</tspan>
                <tspan class="char-anim" style="--i: 11">u</tspan>
                <tspan class="char-anim" style="--i: 12">c</tspan>
                <tspan class="char-anim" style="--i: 13">t</tspan>
                <tspan class="char-anim" style="--i: 14">s</tspan>
            </text>

            <!-- r → Design & Visual Identity -->
            <text class="section-title section-r" text-anchor="middle">
                <tspan class="char-target">D</tspan>
                <tspan class="char-anim" style="--i: 0">e</tspan>
                <tspan class="char-anim" style="--i: 1">s</tspan>
                <tspan class="char-anim" style="--i: 2">i</tspan>
                <tspan class="char-anim" style="--i: 3">g</tspan>
                <tspan class="char-anim" style="--i: 4">n</tspan>
                <tspan class="char-anim space" style="--i: 5">&nbsp;</tspan>
                <tspan class="char-anim" style="--i: 6">&amp;</tspan>
                <tspan class="char-anim space" style="--i: 7">&nbsp;</tspan>
                <tspan class="char-anim" style="--i: 8">V</tspan>
                <tspan class="char-anim" style="--i: 9">i</tspan>
                <tspan class="char-anim" style="--i: 10">s</tspan>
                <tspan class="char-anim" style="--i: 11">u</tspan>
                <tspan class="char-anim" style="--i: 12">a</tspan>
                <tspan class="char-anim" style="--i: 13">l</tspan>
                <tspan class="char-anim space" style="--i: 14">&nbsp;</tspan>
                <tspan class="char-anim" style="--i: 15">I</tspan>
                <tspan class="char-anim" style="--i: 16">d</tspan>
                <tspan class="char-anim" style="--i: 17">e</tspan>
                <tspan class="char-anim" style="--i: 18">n</tspan>
                <tspan class="char-anim" style="--i: 19">t</tspan>
                <tspan class="char-anim" style="--i: 20">i</tspan>
                <tspan class="char-anim" style="--i: 21">t</tspan>
                <tspan class="char-anim" style="--i: 22">y</tspan>
            </text>

            <!-- f → Illustration -->
            <text class="section-title section-f" text-anchor="middle">
                <tspan class="char-target">I</tspan>
                <tspan class="char-anim" style="--i: 0">l</tspan>
                <tspan class="char-anim" style="--i: 1">l</tspan>
                <tspan class="char-anim" style="--i: 2">u</tspan>
                <tspan class="char-anim" style="--i: 3">s</tspan>
                <tspan class="char-anim" style="--i: 4">t</tspan>
                <tspan class="char-anim" style="--i: 5">r</tspan>
                <tspan class="char-anim" style="--i: 6">a</tspan>
                <tspan class="char-anim" style="--i: 7">t</tspan>
                <tspan class="char-anim" style="--i: 8">i</tspan>
                <tspan class="char-anim" style="--i: 9">o</tspan>
                <tspan class="char-anim" style="--i: 10">n</tspan>
            </text>

        </svg>

        <div class="hint">CLICK LETTER P</div>

        <script src="script.js"></script>
    </body>
</html>
